<div class="min-h-screen flex items-center justify-center bg-gray-100 p-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6 mr-5">

    <!-- Title -->
    <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">
      Export Data
    </h2>

    <!-- Payroll No Input -->
    <label class="block mb-4">
      <span class="text-gray-700 text-sm font-medium">Employee #</span>

      <input
        type="number"
        [(ngModel)]="payrollNo"
        placeholder="Enter Employee Number"
        class="mt-2 block w-full rounded-lg border border-gray-300 px-3 py-2
               focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </label>

    <!-- Button -->
    <button
      (click)="exportData()"
      class="w-full bg-green-600 text-white py-2 rounded-lg
             hover:bg-green-700 disabled:opacity-50 disabled:cursor-not-allowed"
    >
      {{ loading ? 'Exporting...' : 'Export' }}
    </button>

  </div>


  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6">

    <!-- Title -->
    <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">
      Excel Upload
    </h2>

    <!-- File Input -->
    <label class="block mb-4">
      <span class="text-gray-700 text-sm font-medium">Select Excel File</span>

      <input
        type="file"
        (change)="onFileSelected($event)"
        accept=".xlsx,.xls"
        class="mt-2 block w-full text-sm text-gray-500
               file:mr-4 file:py-2 file:px-4
               file:rounded-lg file:border-0
               file:text-sm file:font-semibold
               file:bg-blue-50 file:text-blue-700
               hover:file:bg-blue-100"
      />
    </label>

    <!-- Buttons -->
    <div class="flex gap-3 mb-4">

      <button
        (click)="upload()"
        class="flex-1 bg-blue-600 text-white py-2 rounded-lg
               hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        Upload
      </button>

      <button
        (click)="clear()"
        class="flex-1 bg-gray-200 text-gray-700 py-2 rounded-lg
               hover:bg-gray-300 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        Clear
      </button>

    </div>

  </div>

</div>
